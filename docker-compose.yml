services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend/models:/app/models
      - ./uploads:/app/uploads
    environment:
      - HF_TOKEN=${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8001
